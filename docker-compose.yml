version: "3.8"

services:
  backend:
    build: .
    container_name: semantic-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: always

  frontend:
    build: ./frontend
    container_name: semantic-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: always